{% extends "base.html" %}
{% block title %}Connexion — Codexo{% endblock %}
{% block content %}
<div class="auth-card">
  <span class="eyebrow">Bienvenue</span>
  <h2>Connexion</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <p>
        <label>{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </p>
    {% endfor %}
    {{ form.non_field_errors }}
    <button type="submit">Se connecter</button>
  </form>
  <div class="switch">Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a></div>
</div>
{% endblock %}
